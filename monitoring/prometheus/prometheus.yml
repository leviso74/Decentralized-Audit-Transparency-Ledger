global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: audit_ledger_exporter
    static_configs:
      - targets: ["metrics-exporter:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
